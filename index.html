<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 속보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 구글 번역 API 스크립트 -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; top: 0 !important; position: static !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 구글 번역 툴바 및 요소 숨기기 */
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget, .skiptranslate { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
        #google_translate_element { display: none !important; }
        body { top: 0 !important; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="location.reload()">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i data-lucide="globe" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-900 leading-tight">글로벌 속보</h1>
                <p class="text-xs text-gray-500 font-medium flex items-center mt-0.5">
                    <i data-lucide="bot" class="w-3 h-3 mr-1"></i>
                    Powered by AI
                </p>
            </div>
        </div>

        <!-- 실시간 수집 대신 들어가는 번역 버튼 영역 -->
        <div class="flex items-center space-x-4 text-sm font-medium bg-gray-100 px-4 py-2 rounded-full border border-gray-200">
            <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('ko')">한국어</button>
            <span class="text-gray-300">|</span>
            <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('en')">English</button>
            <span class="text-gray-300">|</span>
            <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('zh-CN')">中文</button>
        </div>
        
        <!-- 숨겨진 구글 번역 요소 -->
        <div id="google_translate_element"></div>
    </header>

    <!-- Main Content (이전과 동일) -->
    <main class="flex-1 max-w-7xl w-full mx-auto flex flex-col md:flex-row overflow-hidden my-6 bg-white rounded-xl shadow-sm border border-gray-200 h-[800px]">
        <aside class="w-full md:w-80 border-r border-gray-200 flex flex-col h-full overflow-hidden bg-gray-50/50">
            <div class="p-4 border-b border-gray-200 bg-white">
                <h2 class="font-bold text-gray-800 flex items-center">
                    <i data-lucide="newspaper" class="w-4 h-4 mr-2 text-blue-500"></i>
                    최신 요약 속보
                </h2>
            </div>
            <div id="news-list" class="overflow-y-auto flex-1">
                <!-- Python이 채워넣을 자리 -->
            </div>
        </aside>

        <section class="flex-1 flex flex-col h-full bg-white relative overflow-hidden">
            <div class="p-6 md:p-10 overflow-y-auto h-full">
                <div id="article-body" class="max-w-3xl mx-auto">
                    <!-- 뉴스 본문 -->
                </div>
            </div>
        </section>
    </main>

    <script>
        // 구글 번역 초기화
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ko',
                includedLanguages: 'ko,en,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // 언어 변경 함수
        function translatePage(langCode) {
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl) {
                selectEl.value = langCode;
                selectEl.dispatchEvent(new Event('change'));
            }
        }

        // 뉴스 로드 함수 (Python 생성 코드와 호환)
        async function loadNews(filePath) {
            try {
                const response = await fetch(filePath);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                document.getElementById('article-body').innerHTML = doc.body.innerHTML;
                
                // 선택 효과
                document.querySelectorAll('#news-list > div').forEach(div => {
                    div.classList.remove('bg-blue-50', 'border-l-4', 'border-l-blue-500');
                    if(div.getAttribute('onclick').includes(filePath)) {
                        div.classList.add('bg-blue-50', 'border-l-4', 'border-l-blue-500');
                    }
                });
                lucide.createIcons();
            } catch (e) { console.log(e); }
        }

        lucide.createIcons();
    </script>
</body>
</html>
