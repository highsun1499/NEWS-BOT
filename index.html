<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>
   AI 속보 큐레이터
  </title>
<script src="https://cdn.tailwindcss.com">
</script>
<style>
   .no-scrollbar::-webkit-scrollbar { display: none; }

    /* 구글 번역 툴바 및 요소들 원천 봉쇄 */
    body { 
        top: 0 !important; 
        position: static !important; 
    }
    .goog-te-banner-frame.skiptranslate, 
    .goog-te-gadget, 
    header.skiptranslate { 
        display: none !important; 
    }
    .goog-text-highlight { 
        background-color: transparent !important; 
        box-shadow: none !important; 
    }
    #google_translate_element { 
        display: none !important; 
    }
    
    /* 번역 후 상단에 생기는 프레임 제거 */
    iframe.goog-te-banner-frame {
        display: none !important;
    }
    
    /* 페이지 전체가 아래로 밀리는 현상 방지 */
    .skiptranslate {
        display: none !important;
    }
  </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
<header class="bg-white shadow-sm p-4 z-10 flex justify-between items-center px-8">
<h1 class="text-2xl font-bold text-blue-600 cursor-pointer" onclick="location.reload()">
    AI Breaking News
   </h1>
<div class="flex space-x-4 text-sm font-medium">
<button class="hover:text-blue-600" onclick="translatePage('ko')">
     한국어
    </button>
<span class="text-gray-300">
     |
    </span>
<button class="hover:text-blue-600" onclick="translatePage('en')">
     English
    </button>
<span class="text-gray-300">
     |
    </span>
<button class="hover:text-blue-600" onclick="translatePage('zh-CN')">
     中文
    </button>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<aside class="w-1/3 lg:w-1/4 bg-white border-r overflow-y-auto no-scrollbar" id="news-list">
<div class="p-4 border-b hover:bg-blue-50 cursor-pointer transition group" onclick="loadNews('./news/post_20260318_113425_CHINA_0.html')">
<div class="flex justify-between items-start">
<span class="text-blue-500 text-[10px] font-bold uppercase">CHINA</span>
<span class="text-gray-400 text-[10px]">03/18</span>
</div>
<h2 class="text-sm font-bold mt-1 line-clamp-2 group-hover:text-blue-700">
                11:34 - AI 요약 속보
            </h2>
</div>
<div class="p-4 border-b hover:bg-blue-50 cursor-pointer transition group" onclick="loadNews('./news/post_20260318_080351_CHINA_0.html')">
<div class="flex justify-between items-start">
<span class="text-blue-500 text-[10px] font-bold uppercase">CHINA</span>
<span class="text-gray-400 text-[10px]">03/18</span>
</div>
<h2 class="text-sm font-bold mt-1 line-clamp-2 group-hover:text-blue-700">
                08:03 - AI 요약 속보
            </h2>
</div>
</aside>
<main class="flex-1 bg-gray-50 overflow-y-auto p-6 lg:p-12" id="content-area">
<div class="h-full flex flex-col items-center justify-center text-gray-400">
<p class="text-xl">
      왼쪽 목록에서 뉴스를 선택해 주세요.
     </p>
</div>
</main>
</div>
<div id="google_translate_element">
</div>
<script type="text/javascript">
   function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ko',
                includedLanguages: 'ko,en,zh-CN',
                autoDisplay: false
            }, 'google_translate_element');
        }

        // 버튼 클릭 시 호출될 번역 함수
   function translatePage(langCode) {
       const selectField = document.querySelector(".goog-te-combo");
       if (selectField) {
           selectField.value = langCode;
           selectField.dispatchEvent(new Event('change'));
           
           // 번역 후 브라우저가 강제로 스크롤이나 레이아웃을 옮기는 것 방지
           setTimeout(() => {
               document.body.style.top = "0px";
               // 툴바가 생성되었다면 즉시 제거 시도
               const toolbar = document.querySelector('.goog-te-banner-frame');
               if(toolbar) toolbar.style.display = 'none';
           }, 100);
       }
   }
  </script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" type="text/javascript">
</script>
<script>
   async function loadNews(url) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '<div class="text-center mt-20 text-blue-500 font-bold">Loading...</div>';
            try {
                const response = await fetch(url);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                contentArea.innerHTML = `<div class="bg-white p-8 rounded-xl shadow-sm max-w-4xl mx-auto">${doc.body.innerHTML}</div>`;
            } catch (error) {
                contentArea.innerHTML = '<div class="text-red-500 text-center mt-20">Error.</div>';
            }
        }
  </script>
</body>
</html>
