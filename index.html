<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>글로벌 속보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ko',
                includedLanguages: 'ko,en,zh-CN'
            }, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" type="text/javascript"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; top: 0px !important; position: static !important; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 구글 번역 숨기기 (기존 동일) */
        iframe.skiptranslate, .goog-te-banner-frame { display: none !important; }
        .goog-tooltip, .goog-tooltip:hover { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; border: none !important; }
        #google_translate_element { position: absolute; width: 0px; height: 0px; overflow: hidden; top: -9999px; left: -9999px; opacity: 0; z-index: -100; }

        /* 커스텀 스크롤바 (기존 동일) */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

<body class="bg-gray-50 flex flex-col h-screen">

<!-- Header -->
<header class="bg-white border-b border-gray-200 flex-shrink-0 px-6 py-4 flex items-center justify-between z-10">
    <div class="flex items-center space-x-3 cursor-pointer" onclick="goHome()">
        <div class="bg-blue-600 p-2 rounded-lg">
            <i class="w-6 h-6 text-white" data-lucide="globe"></i>
        </div>
        <div>
            <h1 class="text-xl font-bold text-gray-900 leading-tight">글로벌 속보</h1>
            <p class="text-xs text-gray-500 font-medium flex items-center mt-0.5">
                <i class="w-3 h-3 mr-1" data-lucide="bot"></i>
                Powered by AI
            </p>
        </div>
    </div>
    <div class="flex items-center space-x-4 text-sm font-medium bg-gray-100 px-4 py-2 rounded-full border border-gray-200">
        <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('ko')">한국어</button>
        <span class="text-gray-300">|</span>
        <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('en')">English</button>
        <span class="text-gray-300">|</span>
        <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('zh-CN')">中文</button>
    </div>
    <div id="google_translate_element"></div>
</header>

<!-- Main Content -->
<main class="flex-1 max-w-7xl w-full mx-auto flex flex-col md:flex-row overflow-hidden my-4 bg-white rounded-xl shadow-sm border border-gray-200">
    
    <!-- 왼쪽 사이드바 (기사 목록) -->
    <aside class="w-full md:w-80 border-r border-gray-200 flex flex-col h-full bg-white flex-shrink-0">
        <div class="p-4 border-b border-gray-200 bg-white flex-shrink-0">
            <h2 class="font-bold text-gray-800 flex items-center">
                <i class="w-4 h-4 mr-2 text-blue-500" data-lucide="newspaper"></i>
                최신 요약 속보
            </h2>
        </div>
        
        <!-- ⭐ 여기가 디자인 수정된 리스트 영역입니다! -->
        <div class="overflow-y-auto flex-1 min-h-0 custom-scroll" id="news-list">
            
            <!-- 샘플 1 -->
            <div class="px-5 py-4 border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition group" onclick="loadNews('#')">
                <!-- 1. 신문사 -->
                <div class="flex items-center space-x-1.5 mb-1.5">
                    <span class="bg-blue-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-sm">속보</span>
                    <span class="text-xs font-bold text-gray-800">KOREA 데스크</span>
                </div>
                <!-- 2. 기사 제목 -->
                <h2 class="text-[15px] font-bold text-gray-900 leading-snug line-clamp-2 group-hover:text-blue-600 transition-colors">
                    인천 옥련동 모텔에 불...26명 병원 이송, 4명 부상
                </h2>
                <!-- 3. 날짜 및 기자 -->
                <div class="mt-2 text-[11px] text-gray-500 font-medium tracking-wide">
                    2026년 4월 6일 13:12 <span class="mx-1">·</span> AI 기자
                </div>
            </div>

            <!-- 샘플 2 -->
            <div class="px-5 py-4 border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition group" onclick="loadNews('#')">
                <div class="flex items-center space-x-1.5 mb-1.5">
                    <span class="bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-sm">단독</span>
                    <span class="text-xs font-bold text-gray-800">USA 데스크</span>
                </div>
                <h2 class="text-[15px] font-bold text-gray-900 leading-snug line-clamp-2 group-hover:text-blue-600 transition-colors">
                    일론 머스크, 화성 이주 프로젝트 중대 발표 "내년 첫 발사"
                </h2>
                <div class="mt-2 text-[11px] text-gray-500 font-medium tracking-wide">
                    2026년 4월 6일 10:45 <span class="mx-1">·</span> AI 기자
                </div>
            </div>

            <!-- 샘플 3 -->
            <div class="px-5 py-4 border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition group" onclick="loadNews('#')">
                <div class="flex items-center space-x-1.5 mb-1.5">
                    <span class="text-xs font-bold text-gray-800">CHINA 데스크</span>
                </div>
                <h2 class="text-[15px] font-bold text-gray-900 leading-snug line-clamp-2 group-hover:text-blue-600 transition-colors">
                    상하이 증시, 첨단 기술주 중심의 대규모 상승세 기록하며 마감
                </h2>
                <div class="mt-2 text-[11px] text-gray-500 font-medium tracking-wide">
                    2026년 4월 6일 08:20 <span class="mx-1">·</span> AI 기자
                </div>
            </div>

        </div>
    </aside>
    
    <!-- 오른쪽 영역 (기사 본문) -->
    <section class="flex-1 flex flex-col h-full bg-white relative overflow-hidden">
        <div class="overflow-y-auto flex-1 min-h-0 p-6 md:p-10 custom-scroll">
            <div class="max-w-3xl mx-auto" id="article-body">
                <p class="text-gray-400 text-center mt-10">좌측에서 기사를 선택해주세요.</p>
            </div>
        </div>
    </section>
</main>

<script>
    function translatePage(langCode) {
        if (langCode === 'ko') {
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=' + window.location.hostname + '; path=/;';
            location.reload(); 
            return;
        }

        const selectEl = document.querySelector('.goog-te-combo');
        if (selectEl) {
            selectEl.value = langCode;
            selectEl.dispatchEvent(new Event('change', { bubbles: true }));
        } else {
            document.cookie = 'googtrans=/ko/' + langCode + '; path=/;';
            document.cookie = 'googtrans=/ko/' + langCode + '; domain=' + window.location.hostname + '; path=/;';
            location.reload(); 
        }
    }

    function goHome() {
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=' + window.location.hostname + '; path=/;';
        sessionStorage.removeItem("currentNewsFilePath");
        location.reload();
    }

    document.addEventListener("DOMContentLoaded", async () => {
        await loadNewsList();
        const savedArticle = sessionStorage.getItem("currentNewsFilePath");
        if (savedArticle) { loadNews(savedArticle); }
    });

    // ⚡ 파이썬 스크립트가 만든 카드가 있으면 불러오고, 없으면 우리가 디자인한 샘플 유지
    async function loadNewsList() {
        try {
            const response = await fetch('./news/news_list.html');
            if (response.ok) {
                const html = await response.text();
                // html 문서가 비어있지 않으면 덮어씌움
                if (html.trim() !== "") {
                    document.getElementById('news-list').innerHTML = html;
                }
            }
        } catch (e) { console.log("아직 파이썬 연동 전이거나 목록이 없습니다."); }
    }

    async function loadNews(filePath) {
        if (filePath === '#') return; // 샘플 클릭 방지용
        try {
            sessionStorage.setItem("currentNewsFilePath", filePath);
            const response = await fetch(filePath);
            const html = await response.text();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            document.getElementById('article-body').innerHTML = doc.body.innerHTML;
            
            document.querySelectorAll('#news-list > div').forEach(div => {
                div.classList.remove('bg-blue-50', 'border-l-4', 'border-l-blue-500');
                if(div.getAttribute('onclick') && div.getAttribute('onclick').includes(filePath)) {
                    div.classList.add('bg-blue-50', 'border-l-4', 'border-l-blue-500');
                }
            });
            lucide.createIcons();

            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl && selectEl.value !== '' && selectEl.value !== 'ko') {
                setTimeout(() => { selectEl.dispatchEvent(new Event('change', { bubbles: true })); }, 300); 
            }
        } catch (e) { console.error(e); }
    }

    lucide.createIcons();
</script>
</body>
</html>
