<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>글로벌 속보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 구글 번역 API 스크립트 -->
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" type="text/javascript"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; top: 0px !important; position: static !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /*[수정됨] .skiptranslate 전체를 숨기면 번역기 자체가 증발하므로, 상단 배너와 툴팁만 조준해서 숨김 */
        .goog-te-banner-frame { display: none !important; }
        .goog-tooltip, .goog-tooltip:hover { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; border: none !important; }
        
        /* 번역기가 정상적으로 로드는 되지만 화면에는 투명하게 만들어 눈에 안 띄게 조치 */
        #google_translate_element { 
            position: fixed !important;
            bottom: -50px !important;
            left: 0 !important;
            opacity: 0.0001 !important;
            z-index: -100 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
<!-- Header -->
<header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
    <!-- [수정됨] 새로고침 대신 기사 기억을 지우고 진짜 홈으로 가는 함수 연결 -->
    <div class="flex items-center space-x-3 cursor-pointer" onclick="goHome()">
        <div class="bg-blue-600 p-2 rounded-lg">
            <i class="w-6 h-6 text-white" data-lucide="globe"></i>
        </div>
        <div>
            <h1 class="text-xl font-bold text-gray-900 leading-tight">글로벌 속보</h1>
            <p class="text-xs text-gray-500 font-medium flex items-center mt-0.5">
                <i class="w-3 h-3 mr-1" data-lucide="bot"></i>
                Powered by AI
            </p>
        </div>
    </div>
    <!-- 번역 버튼 영역 -->
    <div class="flex items-center space-x-4 text-sm font-medium bg-gray-100 px-4 py-2 rounded-full border border-gray-200">
        <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('ko')">한국어</button>
        <span class="text-gray-300">|</span>
        <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('en')">English</button>
        <span class="text-gray-300">|</span>
        <button class="text-gray-600 hover:text-blue-600 transition" onclick="translatePage('zh-CN')">中文</button>
    </div>
    <!-- 숨겨진 구글 번역 요소 -->
    <div id="google_translate_element"></div>
</header>

<!-- Main Content -->
<main class="flex-1 max-w-7xl w-full mx-auto flex flex-col md:flex-row overflow-hidden my-6 bg-white rounded-xl shadow-sm border border-gray-200 h-[800px]">
    <aside class="w-full md:w-80 border-r border-gray-200 flex flex-col h-full overflow-hidden bg-gray-50/50">
        <div class="p-4 border-b border-gray-200 bg-white">
            <h2 class="font-bold text-gray-800 flex items-center">
                <i class="w-4 h-4 mr-2 text-blue-500" data-lucide="newspaper"></i>
                최신 요약 속보
            </h2>
        </div>
        <div class="overflow-y-auto flex-1" id="news-list">
            
            <!-- 뉴스 목록 (파이썬이 채우거나 기존 작성해둔 리스트 그대로 유지하시면 됩니다) -->
            <div class="p-4 border-b hover:bg-blue-50 cursor-pointer transition group" onclick="loadNews('./news/post_20260405_060916_KOREA_1.html')">
                <div class="flex justify-between items-start">
                    <span class="text-blue-500 text-[10px] font-bold uppercase">KOREA</span>
                    <span class="text-gray-400 text-[10px]">04/05</span>
                </div>
                <h2 class="text-sm font-bold mt-1 line-clamp-2 group-hover:text-blue-700">06:09 - AI 요약 속보</h2>
            </div>
            <div class="p-4 border-b hover:bg-blue-50 cursor-pointer transition group" onclick="loadNews('./news/post_20260405_042910_USA_0.html')">
                <div class="flex justify-between items-start">
                    <span class="text-blue-500 text-[10px] font-bold uppercase">USA</span>
                    <span class="text-gray-400 text-[10px]">04/05</span>
                </div>
                <h2 class="text-sm font-bold mt-1 line-clamp-2 group-hover:text-blue-700">04:29 - AI 요약 속보</h2>
            </div>
            <!-- (이하 리스트 생략됨, 기존 목록 그대로 사용) -->

        </div>
    </aside>
    <section class="flex-1 flex flex-col h-full bg-white relative overflow-hidden">
        <div class="p-6 md:p-10 overflow-y-auto h-full">
            <div class="max-w-3xl mx-auto" id="article-body">
                <!-- 여기에 fetch로 기사 본문이 로드됩니다 -->
            </div>
        </div>
    </section>
</main>

<script>
    // ⚡ 번역 위젯 초기화
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ko',
            includedLanguages: 'ko,en,zh-CN',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }

    // ⚡ 번역 전용 함수 
    function translatePage(langCode) {
        const selectEl = document.querySelector('.goog-te-combo');
        
        if (selectEl) {
            // 위젯이 안정적으로 뷰에 렌더링 된 경우 
            selectEl.value = (langCode === 'ko') ? '' : langCode;
            selectEl.dispatchEvent(new Event('change', { bubbles: true }));
        } else {
            console.warn("구글 위젯 로딩 지연 중");
            // 새로 페이지를 접속하자마자 번역 버튼을 1초만에 과도하게 쿨릭했을 때만 방어적으로 뜹니다.
            alert("네트워크 연결 중입니다. 1~2초 뒤에 다시 버튼을 눌러주세요.");
        }
    }

    // ⚡ 홈버튼 클릭 함수 (세션 기록 지우고 완전 초기화)
    function goHome() {
        sessionStorage.removeItem("currentNewsFilePath");
        location.reload();
    }

    // ⚡ 브라우저 처음 로딩/새로고침 시 마지막 읽던 기사 복원
    document.addEventListener("DOMContentLoaded", () => {
        const savedArticle = sessionStorage.getItem("currentNewsFilePath");
        if (savedArticle) {
            loadNews(savedArticle);
        }
    });

    // ⚡ 기사 로드 함수
    async function loadNews(filePath) {
        try {
            // [추가됨] 새로고침해도 기사 내용이 유지되게 읽고 있는 페이지 저장
            sessionStorage.setItem("currentNewsFilePath", filePath);

            const response = await fetch(filePath);
            const html = await response.text();
            
            // HTML 파싱 후 본문 꽂아넣기
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            document.getElementById('article-body').innerHTML = doc.body.innerHTML;
            
            // 왼쪽 목록 클릭 효과 갱신
            document.querySelectorAll('#news-list > div').forEach(div => {
                div.classList.remove('bg-blue-50', 'border-l-4', 'border-l-blue-500');
                if(div.getAttribute('onclick') && div.getAttribute('onclick').includes(filePath)) {
                    div.classList.add('bg-blue-50', 'border-l-4', 'border-l-blue-500');
                }
            });
            lucide.createIcons();

            // ⭐ 영어나 중국어로 설정되어 있다면 기사를 바꿔 클릭해도 자동 재번역 트리거!
            const selectEl = document.querySelector('.goog-te-combo');
            if (selectEl && selectEl.value !== '') {
                setTimeout(() => {
                    selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                }, 300); 
            }
        } catch (e) {
            console.error("기사를 불러오는 중 에러 발생:", e);
        }
    }

    lucide.createIcons();
</script>
</body>
</html>
