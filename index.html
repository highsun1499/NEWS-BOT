<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 속보 큐레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 좌측 목록 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-white shadow-sm p-4 z-10">
        <h1 class="text-2xl font-bold text-blue-600 text-center cursor-pointer" onclick="location.reload()">AI Breaking News</h1>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-1/3 lg:w-1/4 bg-white border-r overflow-y-auto no-scrollbar" id="news-list">
            <div class="p-10 text-center text-gray-500">뉴스를 불러오는 중...</div>
        </aside>

        <main class="flex-1 bg-gray-50 overflow-y-auto p-6 lg:p-12" id="content-area">
            <div class="h-full flex flex-col items-center justify-center text-gray-400">
                <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2zM14 2v4h4"></path></svg>
                <p class="text-xl">왼쪽 목록에서 뉴스를 선택해 주세요.</p>
            </div>
        </main>
    </div>

    <script>
        // 화면 이동 없이 내용을 바꿔치기하는 함수
        async function loadNews(url) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '<div class="text-center mt-20 text-blue-500 font-bold">기사를 불러오는 중...</div>';
            
            try {
                const response = await fetch(url);
                const html = await response.text();
                
                // 가져온 HTML에서 body 안의 내용만 추출
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newContent = doc.body.innerHTML;
                
                // 본문 영역에 주입
                contentArea.innerHTML = `<div class="bg-white p-8 rounded-xl shadow-sm max-w-4xl mx-auto">${newContent}</div>`;
                
                // "목록으로 돌아가기" 버튼은 이제 필요 없으므로 숨김 처리 (선택사항)
                const backBtn = contentArea.querySelector('a[href*="index.html"]');
                if(backBtn) backBtn.style.display = 'none';
                
            } catch (error) {
                contentArea.innerHTML = '<div class="text-red-500 text-center mt-20">기사를 불러오지 못했습니다.</div>';
            }
        }
    </script>
</body>
</html>
