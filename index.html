<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 속보 큐레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 구글 번역 툴바 강제로 숨기기 */
        body { top: 0 !important; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        .goog-te-gadget { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
        #google_translate_element { display: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-white shadow-sm p-4 z-10 flex justify-between items-center px-8">
        <h1 class="text-2xl font-bold text-blue-600 cursor-pointer" onclick="location.reload()">AI Breaking News</h1>
        
        <div class="flex space-x-4 text-sm font-medium">
            <button onclick="translatePage('ko')" class="hover:text-blue-600">한국어</button>
            <span class="text-gray-300">|</span>
            <button onclick="translatePage('en')" class="hover:text-blue-600">English</button>
            <span class="text-gray-300">|</span>
            <button onclick="translatePage('zh-CN')" class="hover:text-blue-600">中文</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-1/3 lg:w-1/4 bg-white border-r overflow-y-auto no-scrollbar" id="news-list">
            <div class="p-10 text-center text-gray-500">뉴스를 불러오는 중...</div>
        </aside>

        <main class="flex-1 bg-gray-50 overflow-y-auto p-6 lg:p-12" id="content-area">
            <div class="h-full flex flex-col items-center justify-center text-gray-400">
                <p class="text-xl">왼쪽 목록에서 뉴스를 선택해 주세요.</p>
            </div>
        </main>
    </div>

    <div id="google_translate_element"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ko',
                includedLanguages: 'ko,en,zh-CN',
                autoDisplay: false
            }, 'google_translate_element');
        }

        // 버튼 클릭 시 호출될 번역 함수
        function translatePage(langCode) {
            const selectField = document.querySelector(".goog-te-combo");
            if (selectField) {
                selectField.value = langCode;
                selectField.dispatchEvent(new Event('change'));
            }
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        async function loadNews(url) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '<div class="text-center mt-20 text-blue-500 font-bold">Loading...</div>';
            try {
                const response = await fetch(url);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                contentArea.innerHTML = `<div class="bg-white p-8 rounded-xl shadow-sm max-w-4xl mx-auto">${doc.body.innerHTML}</div>`;
            } catch (error) {
                contentArea.innerHTML = '<div class="text-red-500 text-center mt-20">Error.</div>';
            }
        }
    </script>
</body>
</html>
